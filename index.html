<!DOCTYPE html>
<html>

<head>
    <title>Dice Battle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 class="title neon">
        <span>DICE</span>
        <span style="color: red;">🗲</span>
        <span>GAME</span>
    </h1>
    <p class="tagline">
         Roll the dice and challenge your friend!🎲
    </p>

    <div class="home-wrapper">

        <div class="home-card">

            <input type="text" id="p1" placeholder="Player 1 Name">
            <input type="text" id="p2" placeholder="Player 2 Name">
            <p id="error" class="error-msg"></p>

            <button class="play-btn" onclick="startGame()">🚀 Play Now</button>

        </div>

        <div class="home-card leaderboard">

            <h2>🏆 Leaderboard</h2>
            <p id="todayWinner">Today Winner: None</p>
            <p id="allTimeLeader">All Time Leader: None</p>

        </div>

    </div>

    <script src="script.js"></script>
    <script>
        window.addEventListener("DOMContentLoaded", function () {
            loadLeaderboard();
        });
    </script>

</body>

</html>
